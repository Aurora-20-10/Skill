<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Hệ Phản Xạ Chiến Lược Cá Nhân – T-04 / T-05</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🌌 Hệ Phản Xạ Chiến Lược Cá Nhân</h1>
    <p class="subtitle">Điều phối kỹ năng – bản thể – vận mệnh sống</p>
  </header>

  <!-- MODULE: SKILL MANAGER -->
  <section>
    <h2>📘 Kỹ Năng Chiến Lược</h2>
    <button onclick="openSkillForm()">+ Thêm kỹ năng</button>
    <div id="skillFilters"></div>
    <div id="skillCardsContainer">
      <!-- Các thẻ kỹ năng (card) sẽ render tại đây bằng JS -->
    </div>
  </section>

  <!-- MODULE: DASHBOARD -->
  <section>
    <h2>📊 Dashboard Phản Xạ</h2>
    <div id="dashboardContainer">
      <p>(Biểu đồ bản thể – trọng số – gap – năng lượng...)</p>
    </div>
  </section>

  <!-- MODULE: COMBAT LOG -->
  <section>
    <h2>⚔️ Tình Huống Thực Chiến</h2>
    <button onclick="addUseCase()">+ Ghi chiến trận</button>
    <table id="useCases">
      <thead>
        <tr>
          <th>Ngày</th>
          <th>Kỹ năng dùng</th>
          <th>Tình huống</th>
          <th>Phản ứng</th>
          <th>Kết quả</th>
          <th>Bài học</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- MODULE: PHÂN TÍCH CÁ NHÂN -->
  <section>
    <h2>🧠 Tự Phân Tầng – Nhận Thức – Lệch Trục</h2>
    <textarea id="reflectionNotes" placeholder="Ghi nhận cảm giác, nhận thức chiến lược, lệch bản thể nếu có..."></textarea>
  </section>

  <!-- POPUP FORM -->
  <div id="skillFormPopup" class="hidden">
    <!-- Sẽ render JS -->
  </div>

  <script src="script.js"></script>
</body>
</html>
